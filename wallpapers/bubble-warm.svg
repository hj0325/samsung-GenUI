<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 2340">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#e8e4de"/>
      <stop offset="100%" stop-color="#d8d4cc"/>
    </radialGradient>
    <radialGradient id="orb1" cx="40%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#c8c0b0" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#b0a898" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#a09888" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="orb2" cx="55%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#f5f0c8" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#e8e0a8" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#d0c8a0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#b8b090" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="orb3" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#a89880" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#908068" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#786850" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="glow" cx="60%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#fffde0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#fffde0" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="2" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feComponentTransfer in="mono" result="bright">
        <feFuncA type="linear" slope="0.15" intercept="0"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="bright" mode="screen"/>
    </filter>
  </defs>
  <rect width="1080" height="2340" fill="url(#bg)"/>
  <!-- Top-right orb -->
  <ellipse cx="780" cy="180" rx="480" ry="480" fill="url(#orb1)" filter="url(#grain)"/>
  <!-- Center large orb (yellow-warm) -->
  <ellipse cx="520" cy="900" rx="560" ry="560" fill="url(#orb2)" filter="url(#grain)"/>
  <!-- Yellow glow -->
  <ellipse cx="600" cy="800" rx="400" ry="400" fill="url(#glow)"/>
  <!-- Bottom orb -->
  <ellipse cx="600" cy="1900" rx="520" ry="520" fill="url(#orb3)" filter="url(#grain)"/>
  <!-- Sparkle overlay -->
  <rect width="1080" height="2340" fill="transparent" filter="url(#grain)" opacity="0.4"/>
</svg>