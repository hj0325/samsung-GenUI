<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 2340">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#e4e0ee"/>
      <stop offset="100%" stop-color="#d8d4e8"/>
    </radialGradient>
    <radialGradient id="orb1" cx="40%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#b8b0d0" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#a8a0c4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#9890b8" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="orb2" cx="55%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#f0ecc8" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#e0d8b0" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#c8c0b8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#b0a8c0" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="orb3" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#908898" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#807088" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#685878" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="glow" cx="60%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#fffde0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fffde0" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="5" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feComponentTransfer in="mono" result="bright">
        <feFuncA type="linear" slope="0.15" intercept="0"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="bright" mode="screen"/>
    </filter>
  </defs>
  <rect width="1080" height="2340" fill="url(#bg)"/>
  <ellipse cx="780" cy="180" rx="480" ry="480" fill="url(#orb1)" filter="url(#grain)"/>
  <ellipse cx="520" cy="900" rx="560" ry="560" fill="url(#orb2)" filter="url(#grain)"/>
  <ellipse cx="600" cy="800" rx="400" ry="400" fill="url(#glow)"/>
  <ellipse cx="600" cy="1900" rx="520" ry="520" fill="url(#orb3)" filter="url(#grain)"/>
  <rect width="1080" height="2340" fill="transparent" filter="url(#grain)" opacity="0.35"/>
</svg>